name: Preview CI/CD
 
on:
  push:
    branches:
      - preview
 
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Preview
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-
 
      - name: Create env file
        run: |
          cat <<'EOF' > .env.preview
          ${{ secrets.API_ENV_PREVIEW }}
          EOF
 
      - name: Create remote directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            mkdir -p ~/deploy/antonio/trinket-os/api-trinketos
 
      - name: Copy files via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "."
          target: "~/deploy/antonio/trinket-os/api-trinketos"
          strip_components: 1
 
      - name: Build and deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 10m
          script: |
            cd ~/deploy/antonio/trinket-os/api-trinketos
            docker compose -f docker-compose-preview.yaml build --no-cache
            docker compose -f docker-compose-preview.yaml up -d
            docker image prune -f